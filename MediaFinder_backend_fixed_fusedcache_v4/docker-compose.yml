services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8088:8088"
    environment:
      MF_LISTEN: ":8088"
      MF_DB: "/app/data/mediafinder.db"
      MF_APIKEY: "secret123"
      MF_CORS_ORIGIN: "http://localhost:3000"
    volumes:
      - ./data:/app/data